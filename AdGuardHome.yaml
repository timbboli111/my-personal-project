dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  statistics_interval: 1
  cache_size: 4194304
  upstream_dns:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  bootstrap_dns:
    - 8.8.8.8
    - 1.1.1.1
  all_servers: true

# Setting DoT & DoH di Port 443
tls:
  enabled: true
  server_name: "" 
  force_https: true
  port_https: 443
  port_dns_over_tls: 443
  port_dns_over_quic: 0
  allow_unencrypted_doh: true

# Daftar Blokir Iklan (Termasuk Indo)
filters:
  - enabled: true
    url: https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
    name: AdGuard DNS filter
  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/pro.txt
    name: HaGeZi Pro
  - enabled: true
    url: https://raw.githubusercontent.com/ABPindo/indonesian-adblock-rules/master/subscriptions/abpindo.txt
    name: ABP Indo

# Akun Login Dashboard (Ganti kalau mau sayang)
auth_name: "admin"
auth_pass: "Pramono22!" 

# Pengaturan tambahan agar ringan
schema_version: 20
